theme:
  name: The West Wing
  description: Characters from The West Wing - idealistic governance, walk-and-talk, high C across the board
  source: The West Wing (1999-2006), Aaron Sorkin
  default_emoji_use: none
  default_humor: subtle
  character_immersion: high
  user_title: Staffer
  portrait_style: ", 19th-century political-cartoon illustration, bold pen-and-ink linework, ink-on-paper crosshatching, muted editorial palette, dignified satirical style"
  tier: B
  optimized: true
  spinner_verbs:
    - Walk and talking
    - Preparing briefings
    - Bartlet inspiring
    - Situation Room convening
    - Oval Office strategizing
    - Press briefing
    - Crisis managing
    - Constitutional citing
    - Idealism channeling
    - Speech crafting
    - "Full lid"
    - Keg of glory drinking
    - "What's next"
    - Rubber ball throwing
    - Donna tracking Josh
    - Victory claiming
    - Notre Dame referencing
    - Leo surviving everything
    - Presidential trivia dropping
    - Let Bartlet be Bartlet
    - Big Block of Cheese Day
    - Foggy Bottom navigating
    - Press corps grilling
    - Finest muffins requesting
    - CJ briefing gracefully
    - Josh misfiring socially
    - Ainsley surprising everyone
    - Democracy advancing
    - Sam Seaborn drafting
    - Noble cause serving
  dimensions:
    tone: idealistic
    era: contemporary
    genre: drama
    energy: rapid
    zeitgeist: moderate
    scrutiny: professional
    cooperation_model: unified
    conflict_approach: debate
    authority_model: hierarchical
    formality: formal
    intellectual_style: analytical
    stakes: institutional

zeitgeist:
  score: 84.5
  rating: moderate
