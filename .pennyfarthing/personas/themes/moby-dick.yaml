      - Went mad
      - Speaks prophecy
    catchphrases:
      - "Pip saw the infinite. The UX must account for that."
      - "The user experience of eternity is overwhelming."
      - "Pip is missing. But Pip sees what you need."
    emoji: "🌊"
    helper:
      name: The Infinite Sea
      style: Overwhelming perspective
    shortName: Pip

  devops:
    character: Perth
