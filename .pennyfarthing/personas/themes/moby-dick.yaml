      style: Where tools are made
    shortName: Perth
  ba:
    character: Ishmael (Analyst)
    visual: "Adult young sailor, medium build, brown hair loosely kept, open round face, brown eyes scanning a small notebook held in one hand, plain loose linen shirt, canvas trousers, leaning against the ship's mast with one foot crossed over the other"
