  - id: 5-8
    title: 'Harden high-score persistence: per-entry load validation and readonly save API'
    description: |
      Hardening follow-ups from the Epic 4 high-score reviews (4-4 / 4-3 / 4-6). loadHighScores in src/shell/storage.ts currently validates array-shape only (Array.isArray), so a corrupt-but-array localStorage payload such as [{}] or [{name:9,score:'x'}] passes malformed entries through to the renderer, which reads entry.name/score/level. Add an isHighScoreEntry type guard so loadHighScores returns only well-formed {name,score,level} rows (dropping bad ones, or [] if none). Also tidy the API and core types: make saveHighScores(table) take readonly HighScoreEntry[] (it never mutates), move the MAX_HIGH_SCORES import to the top of src/core/highscore.ts, and add a doc-comment to qualifiesForHighScore noting it assumes a descending-sorted table. Context: sprint/archive/4-4-session.md Reviewer Assessment (rule-checker #2/#10) and sprint/archive/4-3-session.md / 4-6-session.md follow-ups.
    points: 1
    priority: p2
    status: done
    started: '2026-06-27'
    repos: tempest
    workflow: tdd
    acceptance_criteria:
      - loadHighScores rejects malformed entries via a per-entry isHighScoreEntry guard so a corrupt-but-array payload never reaches callers; covered by tests feeding arrays of garbage objects.
      - saveHighScores parameter is readonly; MAX_HIGH_SCORES import is at the top of highscore.ts; qualifiesForHighScore documents its sorted-descending precondition.
      - Pure core stays pure; all existing high-score tests still pass; typecheck clean.
    completed: '2026-06-27'
    branch: feat/5-8-harden-highscore-persistence
    type: chore
    review_verdict: approved
  - id: 5-9
    title: Robustify loop callbacks and select-spin input edges
    description: |
      Robustness follow-ups from the Epic 4 reviews (4-5 / 4-2). (1) In src/shell/loop.ts the onModeChange (and draw / sampleInput) callbacks are invoked unguarded — if a callback throws, the requestAnimationFrame chain dies and the game silently halts. Now that 4-6 registers a real onModeChange (save-on-commit), wrap the callback invocation so a throw cannot stop the loop (try/catch in one place, or a documented and enforced "callbacks must not throw" contract). (2) In the select-mode handler in src/core/sim.ts, input.spin is not finite-guarded — a NaN spin passes the !== 0 check and poisons selectedLevel via Math.sign(NaN); guard non-finite spin. (3) Remove the dead s.spikes[2]=0.5 setup line in tests/core/sim.death.test.ts (its assertion was already removed). Context: sprint/archive/4-5-session.md Reviewer Assessment (unguarded callback) and sprint/archive/4-2-session.md Reviewer Assessment (L2 NaN spin, dead test line).
    points: 1
    priority: p3
    status: done
    started: '2026-06-27'
    repos: tempest
    workflow: tdd
    acceptance_criteria:
      - A throwing onModeChange (or draw) callback does not halt the loop — the RAF chain survives; covered by a loop test that registers a throwing callback.
      - The select-mode handler ignores non-finite input.spin (no selectedLevel poisoning); covered by a core sim test.
      - The dead s.spikes[2]=0.5 line is removed; full suite and typecheck stay clean.
    completed: '2026-06-27'
    type: chore
    review_verdict: approved
completed: '2026-06-27'
